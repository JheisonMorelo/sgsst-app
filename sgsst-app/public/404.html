<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Guardar la ruta solicitada y redirigir al index para que React Router la maneje
    var path = window.location.pathname + window.location.search;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
